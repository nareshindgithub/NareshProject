version: '3.8'

services:
  # The Node.js Application
  node-app:
    build: .
    image: your-dockerhub-username/node-app:latest
    container_name: node-app-container
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_USER=myuser
      - DB_PASSWORD=mypassword
      - DB_NAME=myappdb
    depends_on:
      - db
    networks:
      - app-network

  # Database Service (e.g., PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: always
    environment:
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=myappdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
